services:
  postgres:
    image: postgres:16-alpine
    container_name: starnet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: starnet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - starnet_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d starnet"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  starnet_postgres_data:
